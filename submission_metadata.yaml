  No LLM was used during candidate ranking or inference; the final pipeline runs
  fully offline without external AI or API calls.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A fully offline, CPU-optimized candidate discovery and ranking pipeline
  designed for large-scale recruitment datasets. The system combines
  deterministic eligibility filtering, metadata-driven business rules,
  structured skill matching, behavioral signal evaluation, and weighted
  scoring to rank candidates against the job description without any
  external API calls during inference.

  The pipeline first removes ineligible candidates using title validation,
  domain-specific veto rules, recruiter engagement thresholds, and profile
  quality checks. Eligible candidates are then scored using weighted
  components covering technical skills, semantic relevance, experience,
  behavioral signals, platform assessments, and education. A deterministic
  metadata-based reasoning engine generates transparent justifications for
  every ranked candidate. Final results are sorted deterministically with
  stable tie-breaking and exported as the required submission.csv.

  The solution is fully reproducible, network-free during ranking, and
  designed to process large candidate collections efficiently on a standard
  CPU.

